name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Generate .env file
      run: |
        cat > .env << EOF
        DEBUG=False
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
        EOF
        
        echo ".env generado para SQLite"
    
    - name: Deploy to Render
      run: |
        # Este webhook lo configuras en Render (opcional)
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_ID }}" ]; then
          curl https://api.render.com/deploy/${{ secrets.RENDER_DEPLOY_HOOK_ID }}
        fi
