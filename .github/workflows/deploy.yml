name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Generate .env file
      run: |
        cat > .env << EOF
        DEBUG=False
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        SUPERUSER_USERNAME=${{ secrets.SUPERUSER_USERNAME }}
        SUPERUSER_PASSWORD=${{ secrets.SUPERUSER_PASSWORD }}
        SUPERUSER_EMAIL=${{ secrets.SUPERUSER_EMAIL }}
        EOF
        
        echo "✓ .env generado con variables de GitHub Secrets"
        echo "  - DEBUG: False"
        echo "  - SECRET_KEY: ***"
        echo "  - ALLOWED_HOSTS: ***"
        echo "  - DATABASE_URL: ***"
        echo "  - SUPERUSER: ***"
    
    - name: Deploy to Render
      run: |
        # Este webhook lo configuras en Render (opcional)
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_ID }}" ]; then
          curl https://api.render.com/deploy/${{ secrets.RENDER_DEPLOY_HOOK_ID }}
        fi
